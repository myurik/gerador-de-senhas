<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gerador de Senhas</title>
</head>
<body>
    <main>
        <h1>Gerador de Senhas</h1>
        <div class="campo-senha">
            <input type="text" id="senha-gerada" readonly/>
            <button id="btn-copiar">
                <svg id="icone-copiar" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg id="icone-check" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </button>
        </div>
        <div id="forca-senha">
            <span id="texto-forca"></span>
            <div class="barra-forca">
                <div id="barra-preenchimento"></div>
            </div>
        </div>
        <div>
            <label for="tamanho">Tamanho da Senha:  <span id="valor-tamanho">16</span></label>
            <input type="range" id="tamanho" min="4" max="32" step="1" value="16">
        </div>
        <div class="opcoes">
            <div>
                <input type="checkbox" id="maiusculas" checked>
                <label for="maiusculas">Incluir Letras Maiúsculas(A-Z)</label>
            </div>
            <div>
                <input type="checkbox" id="minusculas" checked>
                <label for="minusculas">Incluir Letras Minúsculas(a-z)</label>
            </div>
            <div>
                <input type="checkbox" id="numeros" checked>
                <label for="numeros">Incluir Números(0-9)</label>
            </div>
            <div>
                <input type="checkbox" id="simbolos" checked>
                <label for="simbolos">Incluir Símbolos(!@#$...)</label>
            </div>
        </div>
        <button id="btn-gerar">Gerar Senha</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
